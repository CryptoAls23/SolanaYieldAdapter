name: Solana Integration Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI (2.2.20)
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v2.2.20/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM (0.31.1)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          $HOME/.cargo/bin/avm install 0.31.1
          $HOME/.cargo/bin/avm use 0.31.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: yarn install

      - name: Run Mainnet-Fork Tests
        run: |
          # 1. Замінюємо лінк на твій Helius RPC в Anchor.toml
          sed -i 's|https://api.mainnet-beta.solana.com|${{ secrets.SOLANA_RPC_URL }}|g' Anchor.toml
          
          # 2. Безпечний цикл заміни заглушок (захищений від розривів рядків)
          for item in \
            "YieLdDiSPaTcHeRvAuLtXXXXXXXXXXXXXXXXXXXXXXX:Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS" \
            "AdPtReGiStRyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX:SRMuS5Pqnmksuiw7e3E9V6zpPgB5v6E9bS4w9cgZ7vH" \
            "KAdPtKAmInOUSDCXXXXXXXXXXXXXXXXXXXXXXXXXXXX:Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB" \
            "MAdPtMaRGInFiUSDCXXXXXXXXXXXXXXXXXXXXXXXXXXX:4k3DyjzvN88Zb2xchatbbBj9C1ldQ7CycWLYg1fF24gA" \
            "JAdPtJuPiTeRLPXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX:7xKXtg2CW87d97TXJSDpbN5jPidns1G1dvWodJWdqbF9" \
            "MAdPtMaPlEsYrUpXXXXXXXXXXXXXXXXXXXXXXXXXXXXX:9W52Y2gZonevPaFwN98mD3A9wLYs7uVebT6f7vSu7qfE" \
            "DAdPtDrIfTiNsFuNdXXXXXXXXXXXXXXXXXXXXXXXXXXX:MNDEFsaZbJv516pvc64Jv9wzN7v56mSuaKEx8Gr8R6f"
          do
            FROM=$(echo "$item" | cut -d':' -f1)
            TO=$(echo "$item" | cut -d':' -f2)
            find programs/ -name "*.rs" -exec sed -i "s|$FROM|$TO|g" {} +
          done
          
          # 3. Запускаємо тест
          anchor test
