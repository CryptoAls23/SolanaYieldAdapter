name: Solana Integration Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI (2.2.20)
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v2.2.20/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM (0.31.1)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          $HOME/.cargo/bin/avm install 0.31.1
          $HOME/.cargo/bin/avm use 0.31.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: yarn install

      - name: Run Mainnet-Fork Tests
        run: |
          # 1. Створюємо реальний локальний гаманець, щоб Anchor не скаржився на його відсутність
          mkdir -p ~/.config/solana
          $HOME/.local/share/solana/install/active_release/bin/solana-keygen new --no-bip39-passphrase --force

          # 2. Замінюємо лінк на твій Helius RPC в Anchor.toml
          sed -i 's|https://api.mainnet-beta.solana.com|${{ secrets.SOLANA_RPC_URL }}|g' Anchor.toml
          
          # 3. ЛІКВІДАЦІЯ ЗЛАМАНИХ АДРЕС В Anchor.toml (50-значного монстра та кривої Marginfi з літерою "l")
          sed -i 's|FBSyPnxtHKLBZ4UeeUyAnbtFuAmTHLtso9YtsqRDRWkB|Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS|g' Anchor.toml
          sed -i 's|4k3DyjzvN88Zb2xchatbbBj9C1ldQ7CycWLYg1fF24gA|Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS|g' Anchor.toml

          # 4. БРОНЕБІЙНА заміна адрес у коді (враховуємо і дефіси, і підкреслення в назвах папок)
          for dir in programs/*; do
            if [ -d "$dir" ]; then
              prog_name=$(basename "$dir")
              case "$prog_name" in
                yield_dispatcher|yield-dispatcher) TO="Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS" ;;
                adapter_registry|adapter-registry) TO="SRMuS5Pqnmksuiw7e3E9V6zpPgB5v6E9bS4w9cgZ7vH" ;;
                kamino_usdc_adapter|kamino-usdc-adapter) TO="Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB" ;;
                marginfi_usdc_adapter|marginfi-usdc-adapter) TO="Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS" ;;
                jupiter_lp_adapter|jupiter-lp-adapter) TO="7xKXtg2CW87d97TXJSDpbN5jPidns1G1dvWodJWdqbF9" ;;
                maple_syrup_adapter|maple-syrup-adapter) TO="9W52Y2gZonevPaFwN98mD3A9wLYs7uVebT6f7vSu7qfE" ;;
                drift_insurance_adapter|drift-insurance-adapter) TO="MNDEFsaZbJv516pvc64Jv9wzN7v56mSuaKEx8Gr8R6f" ;;
                *) TO="Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS" ;;
              esac
              
              if [ -f "$dir/src/lib.rs" ]; then
                sed -i -E "s|declare_id!\s*\(\s*\"[^\"]+\"\s*\);?|declare_id!(\"${TO}\");|g" "$dir/src/lib.rs"
              fi
            fi
          done

          # 5. ФІНАЛЬНА ДІАГНОСТИКА ПЕРЕД СТАРТОМ
          echo "=== Оновлені адреси в коді ==="
          find programs/ -name "*.rs" -exec grep -H "declare_id!" {} \; || true
          echo "=============================================="
          
          # 6. Запуск тестів
          anchor test
