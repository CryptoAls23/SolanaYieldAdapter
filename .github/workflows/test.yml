name: Solana Integration Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI (2.2.20)
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v2.2.20/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM (0.31.1)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          $HOME/.cargo/bin/avm install 0.31.1
          $HOME/.cargo/bin/avm use 0.31.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: yarn install

      - name: Run Mainnet-Fork Tests
        run: |
          # 1. Замінюємо лінк на твій Helius RPC в Anchor.toml
          sed -i 's|https://api.mainnet-beta.solana.com|${{ secrets.SOLANA_RPC_URL }}|g' Anchor.toml
          
          # 2. Ліквідація 50-значного монстра в списку клонів validator
          sed -i 's|FBSyPnxtHKLBZ4UeeUyAnbtFuAmTHLtso9YtsqRDRWkB|Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS|g' Anchor.toml

          # 3. ДІАГНОСТИКА ДО: Показуємо, які адреси зараз прописані в смарт-контрактах
          echo "=== ДІАГНОСТИКА: Початкові адреси в коді контракту ==="
          find programs/ -name "*.rs" -exec grep -H "declare_id!" {} \; || true
          echo "=============================================="

          # 4. БРОНЕБІЙНА заміна за назвою папок програм
          for dir in programs/*; do
            if [ -d "$dir" ]; then
              prog_name=$(basename "$dir")
              case "$prog_name" in
                yield_dispatcher) TO="Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS" ;;
                adapter_registry) TO="SRMuS5Pqnmksuiw7e3E9V6zpPgB5v6E9bS4w9cgZ7vH" ;;
                kamino_usdc_adapter) TO="Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB" ;;
                marginfi_usdc_adapter) TO="4k3DyjzvN88Zb2xchatbbBj9C1ldQ7CycWLYg1fF24gA" ;;
                jupiter_lp_adapter) TO="7xKXtg2CW87d97TXJSDpbN5jPidns1G1dvWodJWdqbF9" ;;
                maple_syrup_adapter) TO="9W52Y2gZonevPaFwN98mD3A9wLYs7uVebT6f7vSu7qfE" ;;
                drift_insurance_adapter) TO="MNDEFsaZbJv516pvc64Jv9wzN7v56mSuaKEx8Gr8R6f" ;;
                *) TO="Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS" ;;
              esac
              
              # Зачищаємо будь-який вміст declare_id і ставимо ідеальну адресу
              if [ -f "$dir/src/lib.rs" ]; then
                sed -i -E "s|declare_id!\s*\(\s*\"[^\"]+\"\s*\);?|declare_id!(\"${TO}\");|g" "$dir/src/dir/../src/lib.rs" || sed -i -E "s|declare_id!\s*\(\s*\"[^\"]+\"\s*\);?|declare_id!(\"${TO}\");|g" "$dir/src/lib.rs"
              fi
            fi
          done

          # 5. ДІАГНОСТИКА ПІСЛЯ: Перевіряємо, чи успішно пройшла заміна
          echo "=== ДІАГНОСТИКА: Оновлені адреси в коді (мають бути чисті ключі) ==="
          find programs/ -name "*.rs" -exec grep -H "declare_id!" {} \; || true
          echo "=============================================="
          
          # 6. Запускаємо самі тести
          anchor test
