          find programs/ -name "*.rs" -exec sed -i 's|KAdPtKAmInOUSDCXXXXXXXXXXXXXXXXXXXXXXXXXXXX|Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB|g' {} +
